name: CI

on:
  push:
    branches: [upgrade/v3.0.0-performance, main]
  pull_request:
    branches: ["*"]

env:
  QT_QPA_PLATFORM: offscreen
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.lock is regenerated with --generate-hashes via:
          #   uv pip compile pyproject.toml --extra admin --extra dev \
          #     --extra docs --extra ops --extra performance --extra plugins \
          #     --extra redis --generate-hashes -o requirements.lock
          pip install --require-hashes -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Ruff (bug class — blocks)
        # Pyflakes "real bugs" subset: runtime errors (E9), syntax (F7),
        # redefined-while-unused (F811), and undefined-name family (F82x).
        # These have all been driven to zero; regressions must fail the build.
        run: ruff check --select E9,F7,F811,F82 src tests

      - name: Ruff (stylistic backlog — advisory)
        # Remaining ~290 findings are stylistic: W293 whitespace,
        # I001 import sort, F401 unused imports, F541 empty f-strings, etc.
        # Most are auto-fixable (`ruff check --fix`) — left as cleanup TODO.
        run: ruff check src tests
        continue-on-error: true

      - name: MyPy
        run: mypy src --no-error-summary
        continue-on-error: true

  tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Install Qt/EGL system libs
        # PySide6 imports require libEGL.so.1 (and friends) at import-time
        # even when QT_QPA_PLATFORM=offscreen is set. ubuntu-latest doesn't
        # ship these by default. Without this, tests/frontend/* fails on
        # collection with: ImportError: libEGL.so.1: cannot open shared object file
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Run tests with coverage gate
        # Historical KNOWN LIMITATIONS (now resolved):
        #   1. alerting._auto_check_loop daemon thread had no teardown,
        #      causing segfaults during Qt offscreen shutdown.
        #      → Fixed via atexit.register(alert_manager.stop_auto_check)
        #        in src/monitoring/alerting.py + an autouse session
        #        fixture in tests/conftest.py.
        #   2. The PySide6 stub was forced via VCL_FORCE_PYSIDE6_STUB=1
        #      to dodge segfault #1, trading it for AttributeError on
        #      stub gaps. With the system Qt libs installed above the
        #      stub is no longer required — let conftest auto-select
        #      real PySide6 when importable.
        run: |
          pytest --maxfail=1 \
            --ignore=tests/ui \
            --ignore=tests/test_tools_integration.py

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu-py311
          path: |
            coverage.xml
            htmlcov
          if-no-files-found: warn
