name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock

      - name: Read project version
        shell: bash
        run: |
          python -c "import sys; from pathlib import Path; root = Path.cwd(); sys.path[:0] = [str(root), str(root / 'src')]; from src import __version__; sys.stdout.write(__version__)" > .app_version
          echo "APP_VERSION=$(cat .app_version)" >> "$GITHUB_ENV"

      - name: Validate tag matches version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${tag_version}" != "${APP_VERSION}" ]; then
            echo "Tag version (${tag_version}) does not match src.__version__ (${APP_VERSION})"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install "pyinstaller==6.3.0"

      - name: Build executable (Full)
        shell: bash
        env:
          VCL_BUILD_FLAVOR: full
        run: |
          pyinstaller --clean --noconfirm VirtualChemLab.spec

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zipName = "VirtualChemLab-$env:APP_VERSION-windows.zip"
          Compress-Archive -Path "dist/VirtualChemLab/*" -DestinationPath $zipName -Force
          echo "RELEASE_ASSET=$zipName" >> $env:GITHUB_ENV

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "dist/VirtualChemLab.app" ]; then
            tar -czf "VirtualChemLab-${APP_VERSION}-macos.tar.gz" -C dist VirtualChemLab.app
          else
            tar -czf "VirtualChemLab-${APP_VERSION}-macos.tar.gz" -C dist VirtualChemLab
          fi
          echo "RELEASE_ASSET=VirtualChemLab-${APP_VERSION}-macos.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf "VirtualChemLab-${APP_VERSION}-linux.tar.gz" -C dist VirtualChemLab
          echo "RELEASE_ASSET=VirtualChemLab-${APP_VERSION}-linux.tar.gz" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ env.RELEASE_ASSET }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
