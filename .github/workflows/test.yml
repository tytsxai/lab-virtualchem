name: 自动化测试

on:
  push:
    branches: [ main, develop, 'upgrade/**' ]
  pull_request:
    branches: [ main, develop, 'upgrade/**' ]
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: 测试 Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 3.10 dropped: requirements.lock pins contourpy==1.3.3 which
        # requires Python >=3.11. To restore 3.10 matrix support, the
        # lock needs to be regenerated with a contourpy pin compatible
        # with 3.10 (e.g. contourpy==1.3.2).
        python-version: ['3.11', '3.12']

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.lock
          requirements-dev.txt
          pyproject.toml

    - name: 安装 Qt/EGL 系统库 (仅 Linux)
      # PySide6.QtGui dlopens libEGL.so.1 at import time even under
      # QT_QPA_PLATFORM=offscreen. ubuntu-latest doesn't ship these.
      # macOS / Windows ship them via the PySide6 wheels.
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
          libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
          libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
          libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
          libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements.lock
        pip install -r requirements-dev.txt

    - name: 运行测试（含覆盖率）
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      # Alerting daemon thread teardown + atexit fixture make the Qt
      # offscreen segfault path no longer reproducible; this step now
      # blocks the build like a normal test step.
      run: |
        pytest -m "not ui" --maxfail=1 \
          --ignore=tests/ui \
          --ignore=tests/test_tools_integration.py

    - name: 运行测试（跨平台验证，无覆盖率）
      if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
      run: |
        pytest -m "not ui" --maxfail=1 --no-cov \
          --ignore=tests/ui \
          --ignore=tests/test_tools_integration.py

    - name: 运行性能测试
      run: |
        pytest tests/performance -v --no-cov
      continue-on-error: true

    - name: 上传覆盖率报告到 Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false

    - name: 生成覆盖率徽章
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      # Reporting only — don't gate the run on the badge artifact.
      continue-on-error: true
      run: |
        pip install coverage-badge
        coverage-badge -o coverage.svg -f

    - name: 上传测试报告
      if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          .coverage
          temp/.coverage
        if-no-files-found: warn

  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.lock
          requirements-dev.txt
          pyproject.toml

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements.lock
        pip install -r requirements-dev.txt

    - name: Ruff 检查（bug class — 阻塞）
      # 与 ci.yml 一致：仅 E9/F7/F811/F82 类（真 bug）阻塞构建。
      run: ruff check --select E9,F7,F811,F82 src/ tests/ --output-format=github

    - name: Ruff 检查（stylistic backlog — 非阻塞）
      run: ruff check src/ tests/ --output-format=github
      continue-on-error: true

    - name: Ruff 格式检查（advisory）
      run: ruff format --check src/ tests/
      continue-on-error: true

    - name: MyPy 类型检查（advisory）
      run: mypy src/
      continue-on-error: true

  security:
    name: 安全扫描
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.lock
          requirements-dev.txt
          pyproject.toml

    - name: 安装依赖与安全工具
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements.lock
        pip install safety bandit pip-audit

    - name: 检查依赖安全性
      run: |
        safety check --file=requirements.lock --json > safety-report.json
      continue-on-error: true

    - name: 检查依赖漏洞（pip-audit）
      run: |
        pip-audit -r requirements.lock -s osv --timeout 60 -f json -o pip-audit-report.json
      continue-on-error: true

    - name: 运行 Bandit 安全扫描
      run: |
        bandit -r src/ -f json -o bandit-report.json
      continue-on-error: true

    - name: 上传安全报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          safety-report.json
          pip-audit-report.json
          bandit-report.json

  build:
    name: 构建测试
    runs-on: windows-latest
    needs: [test, lint]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.lock
          pyproject.toml

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements.lock
        pip install "pyinstaller==6.3.0"

    - name: 构建应用程序
      run: |
        python -m PyInstaller VirtualChemLab.spec

    - name: 测试构建产物
      run: |
        if (Test-Path "dist/VirtualChemLab/VirtualChemLab.exe") {
          Write-Host "✅ 构建成功"
        } else {
          Write-Host "❌ 构建失败"
          exit 1
        }
      shell: pwsh

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: virtualchemlab-build
        path: dist/VirtualChemLab/
        retention-days: 7
