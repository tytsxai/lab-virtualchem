<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualChemLab 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .header .time {
            color: #666;
            font-size: 14px;
        }

        .header-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .auth-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-controls input {
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px;
            width: 280px;
        }

        .auth-status {
            font-size: 12px;
            color: #666;
        }

        .auth-status.ok {
            color: #10b981;
        }

        .auth-status.warn {
            color: #f59e0b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            color: #333;
            font-size: 32px;
            font-weight: bold;
        }

        .stat-card.success .value {
            color: #10b981;
        }

        .stat-card.danger .value {
            color: #ef4444;
        }

        .stat-card.warning .value {
            color: #f59e0b;
        }

        .stat-card.info .value {
            color: #3b82f6;
        }

        .tabs {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .tab-buttons {
            display: flex;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }

        .tab-button:hover {
            background: #f3f4f6;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-right: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .anomaly-card {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .anomaly-card.medium {
            background: #fef3c7;
            border-left-color: #f59e0b;
        }

        .anomaly-card.low {
            background: #dbeafe;
            border-left-color: #3b82f6;
        }

        .activity-item {
            padding: 12px;
            border-left: 3px solid #e5e7eb;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #f9fafb;
        }

        .activity-item.success {
            border-left-color: #10b981;
        }

        .activity-item.failed {
            border-left-color: #ef4444;
        }

        .config-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            color: #374151;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>

    <body>
	    <div class="container">
	        <div class="header">
	            <h1>🧪 VirtualChemLab 管理后台</h1>
                <div class="header-controls">
	                <div class="time" id="currentTime"></div>
                    <div class="auth-controls">
                        <input type="password" id="adminSecret" placeholder="管理后台密钥 (X-Admin-Secret)">
                        <button class="btn btn-primary" onclick="saveAdminSecret()">应用</button>
                        <span class="auth-status" id="authStatus"></span>
                    </div>
                </div>
	        </div>

        <div class="stats-grid">
            <div class="stat-card info">
                <div class="label">总许可证数</div>
                <div class="value" id="totalLicenses">-</div>
            </div>
            <div class="stat-card success">
                <div class="label">活跃设备数</div>
                <div class="value" id="totalDevices">-</div>
            </div>
            <div class="stat-card danger">
                <div class="label">封控设备数</div>
                <div class="value" id="blockedDevices">-</div>
            </div>
            <div class="stat-card warning">
                <div class="label">24h活动数</div>
                <div class="value" id="recentActivities">-</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab-buttons">
                <button class="tab-button active" onclick="switchTab('devices')">设备管理</button>
                <button class="tab-button" onclick="switchTab('licenses')">许可证管理</button>
                <button class="tab-button" onclick="switchTab('activities')">活动记录</button>
                <button class="tab-button" onclick="switchTab('anomalies')">异常检测</button>
            </div>

            <!-- 设备管理 -->
            <div id="devices" class="tab-content active">
                <div class="search-box">
                    <input type="text" id="deviceSearch" placeholder="搜索设备ID、主机名或MAC地址..." onkeyup="searchDevices()">
                    <button class="btn btn-primary" onclick="refreshDevices()">刷新</button>
                </div>
                <div id="devicesTable"></div>
            </div>

            <!-- 许可证管理 -->
            <div id="licenses" class="tab-content">
                <div class="search-box">
                    <input type="text" id="licenseSearch" placeholder="搜索许可证密钥..." onkeyup="searchLicenses()">
                    <button class="btn btn-primary" onclick="refreshLicenses()">刷新</button>
                </div>
                <div id="licensesTable"></div>
            </div>

            <!-- 活动记录 -->
            <div id="activities" class="tab-content">
                <div class="search-box">
                    <select id="activityFilter" onchange="refreshActivities()">
                        <option value="">所有活动</option>
                        <option value="success">成功</option>
                        <option value="failed">失败</option>
                    </select>
                    <input type="number" id="activityLimit" placeholder="显示数量" value="50" min="10" max="500">
                    <button class="btn btn-primary" onclick="refreshActivities()">刷新</button>
                </div>
                <div id="activitiesTable"></div>
            </div>

            <!-- 异常检测 -->
            <div id="anomalies" class="tab-content">
                <div class="search-box">
                    <input type="text" id="anomalyLicense" placeholder="许可证密钥">
                    <button class="btn btn-primary" onclick="detectAnomalies()">检测异常</button>
                </div>
                <div id="anomaliesResult"></div>
            </div>
        </div>
    </div>

    <script>
        // API 基础 URL：优先同源（推荐通过 AdminAPI 的 / 页面访问），否则回退到本地默认地址
        const DEFAULT_API_BASE_URL = 'http://127.0.0.1:5000/api';
        const API_BASE_URL = (window.location.origin && window.location.origin !== 'null')
            ? `${window.location.origin}/api`
            : DEFAULT_API_BASE_URL;

        // 管理后台密钥（仅存 sessionStorage，关闭页面后清除）
        let ADMIN_SECRET = sessionStorage.getItem('vcl_admin_secret') || '';

        function updateAuthStatus() {
            const el = document.getElementById('authStatus');
            if (!el) return;

            if (!ADMIN_SECRET) {
                el.textContent = '未配置密钥';
                el.className = 'auth-status warn';
                return;
            }

            el.textContent = '已配置密钥';
            el.className = 'auth-status ok';
        }

        function saveAdminSecret() {
            const input = document.getElementById('adminSecret');
            ADMIN_SECRET = (input && input.value ? input.value : '').trim();

            if (ADMIN_SECRET) sessionStorage.setItem('vcl_admin_secret', ADMIN_SECRET);
            else sessionStorage.removeItem('vcl_admin_secret');

            updateAuthStatus();
        }

        function buildAuthHeaders(headers) {
            const merged = Object.assign({}, headers || {});
            if (ADMIN_SECRET) merged['X-Admin-Secret'] = ADMIN_SECRET;
            return merged;
        }

        function escapeHtml(value) {
            const str = value === null || value === undefined ? '' : String(value);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function shortId(value, length = 12) {
            const str = value === null || value === undefined ? '' : String(value);
            if (!str) return '-';
            return str.length > length ? str.substring(0, length) + '...' : str;
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleString('zh-CN');
        }

        async function apiFetch(path, options) {
            const opts = options || {};
            const headers = buildAuthHeaders(opts.headers);
            return fetch(`${API_BASE_URL}${path}`, Object.assign({}, opts, { headers }));
        }

        // 当前数据
        let devicesData = [];
        let licensesData = [];
        let activitiesData = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            const secretInput = document.getElementById('adminSecret');
            if (secretInput && ADMIN_SECRET) secretInput.value = ADMIN_SECRET;
            updateAuthStatus();

            updateTime();
            setInterval(updateTime, 1000);
            loadDashboardStats();
            refreshDevices();
            setInterval(() => {
                loadDashboardStats();
                const activeTab = document.querySelector('.tab-content.active').id;
                if (activeTab === 'devices') refreshDevices();
                else if (activeTab === 'activities') refreshActivities();
            }, 30000); // 每30秒刷新
        });

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }

        // 加载仪表板统计
        async function loadDashboardStats() {
            try {
                const response = await apiFetch(`/dashboard/stats`);
                const data = await response.json();

                if (data.stats) {
                    document.getElementById('totalLicenses').textContent = data.stats.total_licenses;
                    document.getElementById('totalDevices').textContent = data.stats.total_devices;
                    document.getElementById('blockedDevices').textContent = data.stats.blocked_devices;
                    document.getElementById('recentActivities').textContent = data.stats.recent_activities;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            // 更新按钮状态
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 更新内容
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');

            // 加载对应数据
            if (tabName === 'devices') refreshDevices();
            else if (tabName === 'licenses') refreshLicenses();
            else if (tabName === 'activities') refreshActivities();
        }

        // 刷新设备列表
        async function refreshDevices() {
            const container = document.getElementById('devicesTable');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await apiFetch(`/devices`);
                const data = await response.json();

                devicesData = data.devices || [];
                renderDevicesTable(devicesData);
            } catch (error) {
                container.innerHTML = `<div class="empty-state">加载失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        // 渲染设备表格
        function renderDevicesTable(devices) {
            const container = document.getElementById('devicesTable');

            if (devices.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无设备数据</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>设备ID</th>
                            <th>主机名</th>
                            <th>MAC地址</th>
                            <th>首次连接</th>
                            <th>最后活动</th>
                            <th>尝试次数</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            devices.forEach(device => {
                const deviceId = device && device.device_id ? String(device.device_id) : '';
                const deviceIdShort = shortId(deviceId);
                const safeDeviceIdAttr = escapeHtml(deviceId);
                const statusBadge = device && device.is_blocked ?
                    '<span class="badge danger">已封控</span>' :
                    '<span class="badge success">正常</span>';

                html += `
                    <tr>
                        <td title="${safeDeviceIdAttr}">${escapeHtml(deviceIdShort)}</td>
                        <td>${escapeHtml(device && device.hostname ? device.hostname : '-')}</td>
                        <td>${escapeHtml(device && device.mac_address ? device.mac_address : '-')}</td>
                        <td>${escapeHtml(formatDate(device && device.first_seen))}</td>
                        <td>${escapeHtml(formatDate(device && device.last_seen))}</td>
                        <td>${escapeHtml(device && device.total_attempts != null ? device.total_attempts : '-')}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-primary" data-action="view" data-device-id="${safeDeviceIdAttr}">详情</button>
                            ${device && device.is_blocked ?
                        `<button class="btn btn-success" data-action="unblock" data-device-id="${safeDeviceIdAttr}">解封</button>` :
                        `<button class="btn btn-danger" data-action="block" data-device-id="${safeDeviceIdAttr}">封控</button>`
                    }
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;

            container.onclick = (event) => {
                const target = event.target instanceof Element ? event.target : null;
                if (!target) return;
                const btn = target.closest('button[data-action][data-device-id]');
                if (!btn) return;
                const action = btn.dataset.action;
                const deviceId = btn.dataset.deviceId;
                if (!deviceId) return;
                if (action === 'view') viewDevice(deviceId);
                else if (action === 'block') blockDevice(deviceId);
                else if (action === 'unblock') unblockDevice(deviceId);
            };
        }

        // 搜索设备
        function searchDevices() {
            const query = document.getElementById('deviceSearch').value.toLowerCase();
            const filtered = devicesData.filter(device =>
                device.device_id.toLowerCase().includes(query) ||
                (device.hostname && device.hostname.toLowerCase().includes(query)) ||
                (device.mac_address && device.mac_address.toLowerCase().includes(query))
            );
            renderDevicesTable(filtered);
        }

        // 查看设备详情
        async function viewDevice(deviceId) {
            try {
                const response = await apiFetch(`/devices/${deviceId}`);
                const data = await response.json();

                if (data.device) {
                    alert(JSON.stringify(data.device, null, 2));
                }
            } catch (error) {
                alert('获取设备详情失败: ' + error.message);
            }
        }

        // 封控设备
        async function blockDevice(deviceId) {
            const reason = prompt('请输入封控原因:');
            if (!reason) return;

            try {
                const response = await apiFetch(`/devices/${deviceId}/block`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason })
                });

                const data = await response.json();
                alert(data.message || '封控成功');
                refreshDevices();
                loadDashboardStats();
            } catch (error) {
                alert('封控失败: ' + error.message);
            }
        }

        // 解除封控
        async function unblockDevice(deviceId) {
            if (!confirm('确定要解除该设备的封控吗？')) return;

            try {
                const response = await apiFetch(`/devices/${deviceId}/unblock`, {
                    method: 'POST'
                });

                const data = await response.json();
                alert(data.message || '解封成功');
                refreshDevices();
                loadDashboardStats();
            } catch (error) {
                alert('解封失败: ' + error.message);
            }
        }

        // 刷新许可证列表
        async function refreshLicenses() {
            const container = document.getElementById('licensesTable');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await apiFetch(`/licenses`);
                const data = await response.json();

                licensesData = data.licenses || [];
                renderLicensesTable(licensesData);
            } catch (error) {
                container.innerHTML = `<div class="empty-state">加载失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        // 渲染许可证表格
        function renderLicensesTable(licenses) {
            const container = document.getElementById('licensesTable');

            if (licenses.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无许可证数据</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>许可证</th>
                            <th>类型</th>
                            <th>邮箱</th>
                            <th>到期日</th>
                            <th>剩余天数</th>
                            <th>已激活</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            licenses.forEach(license => {
                const fullKey = license.license_key || '';
                const escapedFullKey = escapeHtml(fullKey);
                const shortKey = escapeHtml(shortId(fullKey, 18));
                const licenseType = escapeHtml(license.license_type || '-');
                const email = escapeHtml(license.email || '-');
                const expiryDate = escapeHtml(license.expiry_date || '-');
                const daysRemaining = Number(license.days_remaining);
                const daysText = Number.isFinite(daysRemaining) ? String(daysRemaining) : '-';
                const activated = Boolean(license.is_activated);
                const activatedText = activated ? '是' : '否';

                let statusLabel = '未知';
                let badgeClass = 'info';
                const statusValue = String(license.status || '').toLowerCase();
                if (statusValue === 'expired' || (Number.isFinite(daysRemaining) && daysRemaining <= 0)) {
                    statusLabel = '已过期';
                    badgeClass = 'danger';
                } else if (statusValue === 'inactive' || !activated) {
                    statusLabel = '未激活';
                    badgeClass = 'warning';
                } else if (statusValue === 'active') {
                    statusLabel = '有效';
                    badgeClass = 'success';
                } else if (activated) {
                    statusLabel = '有效';
                    badgeClass = 'success';
                }

                html += `
                    <tr>
                        <td><span title="${escapedFullKey}">${shortKey || '-'}</span></td>
                        <td>${licenseType}</td>
                        <td>${email}</td>
                        <td>${expiryDate}</td>
                        <td>${daysText}</td>
                        <td>${activatedText}</td>
                        <td><span class="badge ${badgeClass}">${statusLabel}</span></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 刷新活动记录
        async function refreshActivities() {
            const container = document.getElementById('activitiesTable');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const limit = document.getElementById('activityLimit').value || 50;
                const response = await apiFetch(`/activities?limit=${limit}`);
                const data = await response.json();

                activitiesData = data.activities || [];
                renderActivitiesTable(activitiesData);
            } catch (error) {
                container.innerHTML = `<div class="empty-state">加载失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        // 渲染活动记录
        function renderActivitiesTable(activities) {
            const container = document.getElementById('activitiesTable');

            if (activities.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无活动记录</div>';
                return;
            }

            let html = '';
            activities.reverse().forEach(activity => {
                const statusClass = activity.success ? 'success' : 'failed';
                const statusText = activity.success ? '成功' : '失败';
                const deviceIdShort = shortId(activity.device_id);
                const hostname = escapeHtml(activity.hostname || '-');
                const ip = escapeHtml(activity.local_ip || '-');
                const reason = activity.reason ? `| 原因: ${escapeHtml(activity.reason)}` : '';

                html += `
                    <div class="activity-item ${statusClass}">
                        <div><strong>${escapeHtml(formatDate(activity.timestamp))}</strong></div>
                        <div>设备: ${escapeHtml(deviceIdShort)} | 主机: ${hostname} | IP: ${ip}</div>
                        <div>状态: ${escapeHtml(statusText)} ${reason}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 检测异常
        async function detectAnomalies() {
            const licenseKey = document.getElementById('anomalyLicense').value;
            if (!licenseKey) {
                alert('请输入许可证密钥');
                return;
            }

            const container = document.getElementById('anomaliesResult');
            container.innerHTML = '<div class="loading">检测中...</div>';

            try {
                const response = await apiFetch(`/licenses/${licenseKey}/anomalies`);
                const data = await response.json();

                renderAnomalies(data.anomalies || []);
            } catch (error) {
                container.innerHTML = `<div class="empty-state">检测失败: ${escapeHtml(error.message)}</div>`;
            }
        }

        // 渲染异常
        function renderAnomalies(anomalies) {
            const container = document.getElementById('anomaliesResult');

            if (anomalies.length === 0) {
                container.innerHTML = '<div class="empty-state">✅ 未检测到异常</div>';
                return;
            }

            let html = '<h3>检测到以下异常:</h3>';
            anomalies.forEach(anomaly => {
                const severityClass = anomaly.severity === 'high' ? '' : anomaly.severity;
                html += `
                    <div class="anomaly-card ${severityClass}">
                        <div><strong>${escapeHtml(anomaly.type)}</strong> - 严重程度: ${escapeHtml(anomaly.severity)}</div>
                        <div>${escapeHtml(anomaly.message)}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 搜索许可证
        function searchLicenses() {
            const query = document.getElementById('licenseSearch').value.toLowerCase();
            const filtered = licensesData.filter(license =>
                license.license_key.toLowerCase().includes(query)
            );
            renderLicensesTable(filtered);
        }
    </script>
</body>

</html>
