[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:pytest-qt
    --basetemp=./temp/pytest
    --cov=src
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
    --cov-fail-under=18
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    ui: UI tests
    game: Game tests
    config: Configuration tests
    error: Error handling tests
    asyncio: Async tests
