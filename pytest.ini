[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    # pytest-qt 在某些环境下会提前初始化 Qt 并导致崩溃；本仓库并不依赖其 qtbot fixture，
    # 因此默认禁用该插件，避免“无显示/CI”环境直接 segfault。
    -p no:pytestqt
    -p no:pytestqt.plugin
    -p no:pytest-qt
    --basetemp=./temp/pytest
    --cov=src
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
    # 当前覆盖率门禁：18%（逐步提升到 30% 是后续目标，需与 README/CI 同步）。
    --cov-fail-under=18
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    ui: UI tests
    game: Game tests
    config: Configuration tests
    error: Error handling tests
    asyncio: Async tests
