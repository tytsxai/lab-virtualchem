[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:pytest-qt
    --ignore=tests/frontend
    --ignore=tests/integration
    --ignore=tests/performance
markers =
    api: API tests
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    ui: UI tests
    game: Game tests
    config: Configuration tests
    error: Error handling tests
    asyncio: Async tests
