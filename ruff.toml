target-version = "py310"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
    "W191",  # indentation contains tabs
    "ARG",   # unused arguments (often for interface compatibility)
    "SIM",   # simplification suggestions (low priority for release)
    "E402",  # import order exceptions used for lazy imports
    "B904",  # prefer explicit exception chaining
    "B007",  # allow unused loop vars in benchmarks
    "B028",  # allow warnings without stacklevel
    "F841",  # allow intentional unused locals
    "C401",  # allow generator set in hot paths
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__.py
"tests/*" = ["S101", "ARG"]  # allow assert in tests, unused arguments in fixtures

[lint.isort]
known-first-party = ["src"]


